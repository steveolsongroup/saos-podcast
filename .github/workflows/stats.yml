name: Sync podcast stats to Notion

on:
  schedule:
    # Once a day at 13:00 UTC (~6-9am US). Adjust as you like.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

concurrency:
  group: podcast-stats
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync-stats
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PODCAST_DB: ${{ secrets.NOTION_PODCAST_DB }}
          NOTION_PODCAST_STATS_DB: ${{ secrets.NOTION_PODCAST_STATS_DB }}
          CAPTIVATE_USER_ID: ${{ secrets.CAPTIVATE_USER_ID }}
          CAPTIVATE_API_KEY: ${{ secrets.CAPTIVATE_API_KEY }}
          CAPTIVATE_SHOW_ID: ${{ secrets.CAPTIVATE_SHOW_ID }}
